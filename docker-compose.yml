services:
  mongo-server:
    image: mongo:latest
    container_name: mongo-server
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb-data:/data/db

  api:
    build: ./MongoApi
    container_name: mongo-api
    ports:
      - "${PORT}:8080"
    environment:
      - MongoDB__ConnectionString=${CONNECTION_STRING}
      - MongoDB__DatabaseName=${DB_NAME}
    depends_on:
      - mongo-server

volumes:
  mongodb-data:
