{
  "services":
    {
      "mongo-server":
        {
          "image": "mongo:latest",
          "container_name": "mongo-server",
          "ports": ["${MONGO_PORT}:27017"],
          "volumes": ["mongodb-data:/data/db"],
        },
      "api":
        {
          "build": "./MongoApi",
          "container_name": "mongo-api",
          "ports": ["${API_PORT}:8080"],
          "environment":
            [
              "MongoDB__ConnectionString=${CONNECTION_STRING}",
              "MongoDB__DatabaseName=${DB_NAME}",
            ],
          "depends_on": ["mongo-server"],
        },
      "frontend":
        {
          "build":
            {
              "context": "./frontend-vue",
              "args": { "VITE_API_BASE": "${API_BASE}" },
            },
          "container_name": "frontend",
          "ports": ["${FRONTEND_PORT}:4173"],
          "depends_on": ["api"],
        },
    },
  "volumes": { "mongodb-data": {} },
}
